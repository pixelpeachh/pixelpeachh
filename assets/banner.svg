
<svg
  width="1200"
  height="360"
  viewBox="0 0 1200 360"
  xmlns="http://www.w3.org/2000/svg"
>

  <defs>

    <!-- Colourful background -->
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8fab"/>
      <stop offset="35%" stop-color="#ffc2d1"/>
      <stop offset="70%" stop-color="#cdb4db"/>
      <stop offset="100%" stop-color="#90dbf4"/>
    </linearGradient>

    <!-- Text shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
        dx="0"
        dy="5"
        stdDeviation="6"
        flood-color="#000000"
        flood-opacity="0.25"
      />
    </filter>

  </defs>

  <!-- Main background -->
  <rect
    width="1200"
    height="360"
    rx="30"
    fill="url(#background)"
  />

  <!-- Decorative circles -->
  <circle
    cx="90"
    cy="65"
    r="75"
    fill="#ffffff"
    opacity="0.15"
  />

  <circle
    cx="1120"
    cy="300"
    r="130"
    fill="#ffffff"
    opacity="0.12"
  />

  <circle
    cx="1060"
    cy="65"
    r="45"
    fill="#ffffff"
    opacity="0.18"
  />

  <circle
    cx="180"
    cy="310"
    r="40"
    fill="#ffffff"
    opacity="0.12"
  />

  <!-- Small decorative stars -->
  <text
    x="160"
    y="105"
    font-family="Arial Rounded MT Bold, Trebuchet MS, sans-serif"
    font-size="30"
    fill="#ffffff"
    opacity="0.8"
  >
    ✦
  </text>

  <text
    x="1010"
    y="120"
    font-family="Arial Rounded MT Bold, Trebuchet MS, sans-serif"
    font-size="25"
    fill="#ffffff"
    opacity="0.8"
  >
    ✦
  </text>

  <text
    x="970"
    y="285"
    font-family="Arial Rounded MT Bold, Trebuchet MS, sans-serif"
    font-size="22"
    fill="#ffffff"
    opacity="0.75"
  >
    ✧
  </text>

  <!-- Bubble heading -->
  <text
    x="600"
    y="105"
    text-anchor="middle"
    font-family="Arial Rounded MT Bold, Trebuchet MS, Comic Sans MS, sans-serif"
    font-size="54"
    font-weight="700"
    letter-spacing="2"
    fill="#ff5d8f"
    stroke="#ffffff"
    stroke-width="7"
    paint-order="stroke"
    filter="url(#shadow)"
  >
    Hey, I'm Ashvitha
  </text>

  <!-- Subtitle -->
  <text
    x="600"
    y="165"
    text-anchor="middle"
    font-family="Arial Rounded MT Bold, Trebuchet MS, Comic Sans MS, sans-serif"
    font-size="28"
    font-weight="700"
    fill="#ffffff"
    stroke="#9c6ade"
    stroke-width="2"
    paint-order="stroke"
  >
    IT Student exploring Cybersecurity &amp; DevSecOps
  </text>

  <!-- Skill badges -->
  <g
    font-family="Arial Rounded MT Bold, Trebuchet MS, sans-serif"
    font-size="20"
    font-weight="700"
    text-anchor="middle"
  >

    <rect
      x="285"
      y="200"
      width="105"
      height="42"
      rx="21"
      fill="#ffffff"
      opacity="0.92"
    />
    <text x="337" y="228" fill="#ff5d8f">Linux</text>

    <rect
      x="405"
      y="200"
      width="115"
      height="42"
      rx="21"
      fill="#ffffff"
      opacity="0.92"
    />
    <text x="462" y="228" fill="#9c6ade">Docker</text>

    <rect
      x="535"
      y="200"
      width="115"
      height="42"
      rx="21"
      fill="#ffffff"
      opacity="0.92"
    />
    <text x="592" y="228" fill="#ff5d8f">Nginx</text>

    <rect
      x="665"
      y="200"
      width="120"
      height="42"
      rx="21"
      fill="#ffffff"
      opacity="0.92"
    />
    <text x="725" y="228" fill="#9c6ade">GitHub</text>

    <rect
      x="800"
      y="200"
      width="110"
      height="42"
      rx="21"
      fill="#ffffff"
      opacity="0.92"
    />
    <text x="855" y="228" fill="#ff5d8f">OWASP</text>

  </g>

  <!-- Description -->
  <text
    x="600"
    y="300"
    text-anchor="middle"
    font-family="Arial Rounded MT Bold, Trebuchet MS, Comic Sans MS, sans-serif"
    font-size="25"
    font-weight="600"
    fill="#ffffff"
    filter="url(#shadow)"
  >
    Building projects. Breaking things. Learning fixes.
  </text>

</svg>
