
<svg width="1200" height="360" viewBox="0 0 1200 360"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff758c"/>
     <stop offset="35%" stop-color="#ffb199"/>
     <stop offset="70%" stop-color="#c471ed"/>
     <stop offset="100%" stop-color="#12c2e9"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8"
                    flood-color="#000000"
                    flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="360"
        rx="30"
        fill="url(#background)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="70" r="75"
          fill="#ffffff"
          opacity="0.12"/>

  <circle cx="1100" cy="300" r="120"
          fill="#ffffff"
          opacity="0.10"/>

  <circle cx="1050" cy="70" r="45"
          fill="#ffffff"
          opacity="0.15"/>

  <!-- Main heading -->
  <text x="600" y="105"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="48"
        font-weight="700"
        fill="#ffffff"
        filter="url(#shadow)">
    Hey, I'm Ashvitha 👋
  </text>

  <!-- Subtitle -->
  <text x="600" y="165"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="27"
        font-weight="600"
        fill="#ffffff">
    IT Student exploring Cybersecurity &amp; DevSecOps
  </text>

  <!-- Skills -->
  <text x="600" y="225"
        text-anchor="middle"
        font-family="Courier New, monospace"
        font-size="23"
        font-weight="600"
        fill="#ffffff">
    Linux • Docker • Nginx • GitHub • OWASP
  </text>

  <!-- Description -->
  <text x="600" y="285"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="24"
        fill="#ffffff">
    Building projects. Breaking things. Learning fixes.
  </text>

</svg>
